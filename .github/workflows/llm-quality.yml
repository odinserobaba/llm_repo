name: LLM quality gates (RAGAS)

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ragas-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Secrets
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      # Optional tuning (can be set as Actions variables too)
      MISTRAL_MODEL: mistral-small-latest
      MISTRAL_BASE_URL: https://api.mistral.ai/v1
      RAGAS_CONCURRENCY: "3"
      MIN_FAITHFULNESS: "0.70"
      MIN_ANSWER_RELEVANCY: "0.60"
      MIN_CONTEXT_RECALL: "0.70"
      EMBEDDINGS_MODEL: all-MiniLM-L6-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (quality gates)
        run: |
          pytest -q

      - name: Upload RAGAS report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-reports
          path: reports/

